<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1450" style="background:#0a0e17">
<text x="450" y="30" fill="#22d3ee" font-family="monospace" font-size="18" text-anchor="middle">African Queen Lite — ESP32 Wiring v2.2</text>
<text x="450" y="50" fill="#9ca3af" font-family="monospace" font-size="11" text-anchor="middle">Honda NX650 Dominator RFVC • Auto-RPM Valve + Fuel + Gear + Sleep</text>
<rect x="390" y="180" width="120" height="360" rx="8" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
<text x="450" y="205" fill="#22d3ee" font-family="monospace" font-size="12" text-anchor="middle">ESP32</text>
<text x="450" y="220" fill="#64748b" font-family="monospace" font-size="9" text-anchor="middle">v2.2</text>
<text x="450" y="530" fill="#f59e0b" font-family="monospace" font-size="8" text-anchor="middle">DEEP SLEEP 10µA</text>
<circle cx="390" cy="198" r="4" fill="#3399FF"/>
<text x="400" y="202" fill="#e5e7eb" font-family="monospace" font-size="8" text-anchor="start">GPIO 4</text>
<line x1="180" y1="198" x2="390" y2="198" stroke="#3399FF" stroke-width="1.5"/>
<text x="40" y="202" fill="#3399FF" font-family="monospace" font-size="8" text-anchor="end">MODE_UP</text>
<circle cx="390" cy="228" r="4" fill="#3399FF"/>
<text x="400" y="232" fill="#e5e7eb" font-family="monospace" font-size="8" text-anchor="start">GPIO 5</text>
<line x1="180" y1="228" x2="390" y2="228" stroke="#3399FF" stroke-width="1.5"/>
<text x="40" y="232" fill="#3399FF" font-family="monospace" font-size="8" text-anchor="end">MODE_DOWN</text>
<circle cx="390" cy="258" r="4" fill="#3399FF"/>
<text x="400" y="262" fill="#e5e7eb" font-family="monospace" font-size="8" text-anchor="start">GPIO16</text>
<line x1="180" y1="258" x2="390" y2="258" stroke="#3399FF" stroke-width="1.5"/>
<text x="40" y="262" fill="#3399FF" font-family="monospace" font-size="8" text-anchor="end">ENCODER_A</text>
<circle cx="390" cy="288" r="4" fill="#3399FF"/>
<text x="400" y="292" fill="#e5e7eb" font-family="monospace" font-size="8" text-anchor="start">GPIO17</text>
<line x1="180" y1="288" x2="390" y2="288" stroke="#3399FF" stroke-width="1.5"/>
<text x="40" y="292" fill="#3399FF" font-family="monospace" font-size="8" text-anchor="end">ENCODER_B</text>
<circle cx="390" cy="318" r="4" fill="#3399FF"/>
<text x="400" y="322" fill="#e5e7eb" font-family="monospace" font-size="8" text-anchor="start">GPIO 0</text>
<line x1="180" y1="318" x2="390" y2="318" stroke="#3399FF" stroke-width="1.5"/>
<text x="40" y="322" fill="#3399FF" font-family="monospace" font-size="8" text-anchor="end">ENCODER_BTN</text>
<circle cx="390" cy="348" r="4" fill="#FF9933"/>
<text x="400" y="352" fill="#e5e7eb" font-family="monospace" font-size="8" text-anchor="start">GPIO18</text>
<line x1="180" y1="348" x2="390" y2="348" stroke="#FF9933" stroke-width="1.5"/>
<text x="40" y="352" fill="#FF9933" font-family="monospace" font-size="8" text-anchor="end">IGNITION_PULSE</text>
<circle cx="390" cy="378" r="4" fill="#3399FF"/>
<text x="400" y="382" fill="#e5e7eb" font-family="monospace" font-size="8" text-anchor="start">GPIO19</text>
<line x1="180" y1="378" x2="390" y2="378" stroke="#3399FF" stroke-width="1.5"/>
<text x="40" y="382" fill="#3399FF" font-family="monospace" font-size="8" text-anchor="end">OIL_PRESSURE</text>
<circle cx="390" cy="408" r="4" fill="#33CC33"/>
<text x="400" y="412" fill="#e5e7eb" font-family="monospace" font-size="8" text-anchor="start">GPIO34</text>
<line x1="180" y1="408" x2="390" y2="408" stroke="#33CC33" stroke-width="1.5"/>
<text x="40" y="412" fill="#33CC33" font-family="monospace" font-size="8" text-anchor="end">THERMISTOR</text>
<circle cx="390" cy="438" r="4" fill="#FF3333"/>
<text x="400" y="442" fill="#e5e7eb" font-family="monospace" font-size="8" text-anchor="start">GPIO35</text>
<line x1="180" y1="438" x2="390" y2="438" stroke="#FF3333" stroke-width="1.5"/>
<text x="40" y="442" fill="#FF3333" font-family="monospace" font-size="8" text-anchor="end">VOLTAGE_DIVIDER</text>
<circle cx="390" cy="468" r="4" fill="#FF3333"/>
<text x="400" y="472" fill="#e5e7eb" font-family="monospace" font-size="8" text-anchor="start">GPIO36</text>
<line x1="180" y1="468" x2="390" y2="468" stroke="#FF3333" stroke-width="1.5"/>
<text x="40" y="472" fill="#FF3333" font-family="monospace" font-size="8" text-anchor="end">STATOR_SENSE</text>
<circle cx="510" cy="198" r="4" fill="#FF9933"/>
<text x="500" y="202" fill="#e5e7eb" font-family="monospace" font-size="8" text-anchor="end">GPIO25</text>
<line x1="510" y1="198" x2="720" y2="198" stroke="#FF9933" stroke-width="1.5"/>
<text x="860" y="202" fill="#FF9933" font-family="monospace" font-size="8" text-anchor="start">EXHAUST_VALVE</text>
<circle cx="510" cy="228" r="4" fill="#FF9933"/>
<text x="500" y="232" fill="#e5e7eb" font-family="monospace" font-size="8" text-anchor="end">GPIO26</text>
<line x1="510" y1="228" x2="720" y2="228" stroke="#FF9933" stroke-width="1.5"/>
<text x="860" y="232" fill="#FF9933" font-family="monospace" font-size="8" text-anchor="start">AIRBOX_FLAP</text>
<circle cx="510" cy="258" r="4" fill="#3399FF"/>
<text x="500" y="262" fill="#e5e7eb" font-family="monospace" font-size="8" text-anchor="end">GPIO27</text>
<line x1="510" y1="258" x2="720" y2="258" stroke="#3399FF" stroke-width="1.5"/>
<text x="860" y="262" fill="#3399FF" font-family="monospace" font-size="8" text-anchor="start">CDI_MAP_A</text>
<circle cx="510" cy="288" r="4" fill="#3399FF"/>
<text x="500" y="292" fill="#e5e7eb" font-family="monospace" font-size="8" text-anchor="end">GPIO33</text>
<line x1="510" y1="288" x2="720" y2="288" stroke="#3399FF" stroke-width="1.5"/>
<text x="860" y="292" fill="#3399FF" font-family="monospace" font-size="8" text-anchor="start">CDI_MAP_B</text>
<circle cx="510" cy="318" r="4" fill="#FF9933"/>
<text x="500" y="322" fill="#e5e7eb" font-family="monospace" font-size="8" text-anchor="end">GPIO32</text>
<line x1="510" y1="318" x2="720" y2="318" stroke="#FF9933" stroke-width="1.5"/>
<text x="860" y="322" fill="#FF9933" font-family="monospace" font-size="8" text-anchor="start">LED_DATA</text>
<circle cx="410" cy="540" r="4" fill="#3399FF"/>
<text x="410" y="560" fill="#3399FF" font-family="monospace" font-size="8" text-anchor="middle">OLED_SDA</text>
<circle cx="460" cy="540" r="4" fill="#3399FF"/>
<text x="460" y="560" fill="#3399FF" font-family="monospace" font-size="8" text-anchor="middle">OLED_SCL</text>
<text x="20" y="600" fill="#22c55e" font-family="monospace" font-size="13" text-anchor="start">⚡ Power Supply</text>
<rect x="20" y="605" width="860" height="60" rx="6" fill="#111827" stroke="#374151" stroke-width="1"/>
<text x="35" y="625" fill="#e5e7eb" font-family="monospace" font-size="9">Battery 12V → 1N5408 → SMAJ28A → 470µF+100nF → 7805 (5V/1A) → ESP32 VIN</text>
<text x="35" y="640" fill="#9ca3af" font-family="monospace" font-size="8">3.3V LDO for sensors/OLED•Voltage dividers: GPIO35 (100k/33k) • GPIO36 (100k/33k)</text>
<text x="35" y="655" fill="#f59e0b" font-family="monospace" font-size="8">DEEP SLEEP: 80mA → 10µA after 5 min engine off • Wake: GPIO4 (Mode+) or GPIO18 (Ignition)</text>
<text x="20" y="680" fill="#22d3ee" font-family="monospace" font-size="13">🔧 Exhaust Valve + Airbox (DRV8833 Production)</text>
<rect x="20" y="685" width="860" height="80" rx="6" fill="#111827" stroke="#374151" stroke-width="1"/>
<text x="35" y="702" fill="#e5e7eb" font-family="monospace" font-size="9">Exhaust: Pololu 37Dx52L gearmotor → DRV8833 (GPIO14=AIN1, GPIO13=AIN2) → AS5600 @ 0x36</text>
<text x="35" y="717" fill="#e5e7eb" font-family="monospace" font-size="9">Airbox: Pololu 37Dx52L gearmotor → DRV8833 (GPIO23=BIN1, GPIO2=BIN2) → AS5600 @ 0x37</text>
<text x="35" y="732" fill="#9ca3af" font-family="monospace" font-size="8">Mode: EXHAUST_VALVE=GPIO25(PWM), AIRBOX_FLAP=GPIO26(PWM) — used in RC servo testing only</text>
<text x="35" y="740" fill="#f59e0b" font-family="monospace" font-size="8">v2.2 NEW: Auto-RPM valve curves — position follows RPM per mode (5 interpolation points)</text>
<text x="35" y="752" fill="#9ca3af" font-family="monospace" font-size="8">Production: USE_PRODUCTION_MOTOR=1 in platformio.ini → DRV8833+AS5600</text>
<text x="20" y="780" fill="#ef4444" font-family="monospace" font-size="13">⚡ Ignition (Ignitech DC-CDI-P2 3-Map)</text>
<rect x="20" y="785" width="860" height="50" rx="6" fill="#111827" stroke="#374151" stroke-width="1"/>
<text x="35" y="802" fill="#e5e7eb" font-family="monospace" font-size="9">CDI Map A (eco): GPIO27=LOW, GPIO33=HIGH → STRASSE/STADT/COMFORT</text>
<text x="35" y="817" fill="#e5e7eb" font-family="monospace" font-size="9">CDI Map B (sport): GPIO27=HIGH, GPIO33=LOW → GELÄNDE/SPORT</text>
<text x="35" y="830" fill="#e5e7eb" font-family="monospace" font-size="9">CDI Map C (fallback): GPIO27=HIGH, GPIO33=HIGH → SOUND/Emergency</text>
<text x="20" y="850" fill="#a78bfa" font-family="monospace" font-size="13">📡 Sensors + Display</text>
<rect x="20" y="855" width="860" height="70" rx="6" fill="#111827" stroke="#374151" stroke-width="1"/>
<text x="35" y="872" fill="#e5e7eb" font-family="monospace" font-size="9">SSD1306 OLED (128x64 I2C) @ 0x3C — SDA=GPIO21, SCL=GPIO22</text>
<text x="35" y="887" fill="#e5e7eb" font-family="monospace" font-size="9">NTC 10kΩ Thermistor → GPIO34 (ADC) • Oil Pressure → GPIO19 • Ignition Pulse → GPIO18</text>
<text x="35" y="902" fill="#9ca3af" font-family="monospace" font-size="8">Battery Voltage → GPIO35 (100k/33k divider) • Stator Output → GPIO36 (100k/33k divider)</text>
<text x="35" y="915" fill="#f59e0b" font-family="monospace" font-size="8">v2.2 NEW: Fuel estimation (software) • Gear detection (RPM/speed correlation) • Config mode (3s press)</text>
<text x="20" y="940" fill="#60a5fa" font-family="monospace" font-size="13">🎮 Controls + LED</text>
<rect x="20" y="945" width="860" height="50" rx="6" fill="#111827" stroke="#374151" stroke-width="1"/>
<text x="35" y="962" fill="#e5e7eb" font-family="monospace" font-size="9">KY-040 Encoder: CLK=GPIO16, DT=GPIO17, BTN=GPIO0 • Mode+=GPIO4, Mode-=GPIO5</text>
<text x="35" y="977" fill="#e5e7eb" font-family="monospace" font-size="9">WS2812 RGB LED → GPIO32 • Long press (3s) → Config Mode • Encoder toggle → Mode/Page select</text>
<text x="35" y="990" fill="#9ca3af" font-family="monospace" font-size="8">Config: Brightness → Valve Cal → Airbox Cal → Mode Select → Exit</text>
<text x="450" y="1430" fill="#64748b" font-family="monospace" font-size="9" text-anchor="middle">AQL v2.2 • Auto-RPM Valve • Fuel Estimation • Gear Detection • Deep Sleep • Config Mode • BLE</text>
</svg>