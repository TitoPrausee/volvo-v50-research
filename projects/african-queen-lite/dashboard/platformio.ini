; African Queen Lite — ESP32 Ride-Mode Controller
; PlatformIO project for Honda NX650 Dominator
; Board: ESP32 DevKit V1, Arduino framework
;
; Ride modes: STRASSE, STADT, GELÄNDE, SPORT, COMFORT, SOUND
; Outputs: CDI ignition timing, exhaust valve PWM, airbox flap PWM
; Inputs: Mode+/Mode- buttons, rotary encoder, ignition pulse coil,
;          thermistor, voltage divider, oil pressure switch
; Display: SSD1306 OLED 128x64 (I2C)
; Indicator: WS2812 RGB LED
; Comms: BLE for smartphone logging

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = default_16MB.csv
board_upload.flash_size = 16MB

; ---- Library Dependencies ----
lib_deps =
    ; I2C OLED display
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.5
    ; Addressable RGB LEDs
    adafruit/Adafruit NeoPixel@^1.11.0
    ; BLE
    ; Built-in ESP32 BLE libraries (BluetoothSerial, BLEDevice)
    ; Rotary encoder
    mathertel/ RotaryEncoder@^1.1.3
    ; Debounce / button handling
    ; Using Bounce2 for robust switch debouncing
    thomasfredericks/Bounce2@^2.71
    ; Smooth sensor readings
    ; Using Arduino built-in map/constrain + simple EWMA filter

build_flags =
    ; Enable watchdog
    -DCONFIG_ESP_INT_WDT=y
    -DCONFIG_ESP_TASK_WDT=y
    -DCONFIG_ESP_TASK_WDT_TIMEOUT_S=10
    ; Brownout detection
    -DCONFIG_BROWNOUT_DET=y
    ; Core debug level
    -DCORE_DEBUG_LEVEL=1
    ; Project defines
    -DAFRICAN_QUEEN_LITE
    -DRIDE_MODE_COUNT=6

; Serial over USB for debug
[env:esp32dev_debug]
extends = env:esp32dev
build_type = debug
monitor_filters = esp32_exception_decoder, time, log2file
build_flags =
    ${env:esp32dev.build_flags}
    -DCORE_DEBUG_LEVEL=5
    -DDEBUG_SERIAL

; ---- Pin Assignment Reference ----
; GPIO 2   — WS2812 RGB LED indicator
; GPIO 4   — Exhaust valve servo PWM
; GPIO 5   — Airbox flap servo PWM
; GPIO 12  — Rotary encoder CLK
; GPIO 13  — Rotary encoder DT
; GPIO 14  — Mode+ button (active-low, internal pull-up)
; GPIO 15  — Mode- button (active-low, internal pull-up)
; GPIO 16  — Ignition pulse coil input (RPM sensing)
; GPIO 17  — CDI ignition timing output
; GPIO 18  — Oil pressure switch (active-low)
; GPIO 19  — Thermistor analog input (ADC)
; GPIO 34  — Battery voltage divider (ADC, input-only)
; I2C SDA  — GPIO 21 (SSD1306 OLED)
; I2C SCL  — GPIO 22 (SSD1306 OLED)
