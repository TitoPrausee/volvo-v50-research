; African Queen Lite — ESP32 Ride-Mode Controller v2.0
; PlatformIO Project Configuration
; Honda NX650 Dominator RFVC
;
; v2.0: Added EEPROM, encoder, longevity monitoring
; New features: stator health, battery SOC, maintenance tracker,
;               rotary encoder, display page cycling

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Serial monitor
monitor_speed = 115200
monitor_filters = default, time

; Upload
upload_speed = 921600
upload_port = /dev/ttyUSB0

; Build flags
build_flags =
    -DARDUINO=10819
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_ESP32_DEV
    ; Watchdog timeout
    -DESP_TASK_WDT_TIMEOUT_S=5
    ; Brownout detection
    -DESP_BROWNOUT_DET=1
    ; Version
    -DAQL_VERSION_MAJOR=2
    -DAQL_VERSION_MINOR=0
    -DAQL_VERSION_PATCH=0

; Libraries
lib_deps =
    adafruit/Adafruit SSD1306 @ ^2.5.7
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit NeoPixel @ ^1.12.0
    madhephaestus/ESP32Servo @ ^1.1.2
    h2zero/NimBLE-Arduino @ ^1.4.0

; Partition scheme — use "default" for OTA support
board_build.partitions = default.csv

; Extra build flags for EEPROM
build_flags +=
    -DEEPROM_SIZE=64