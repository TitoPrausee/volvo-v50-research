; African Queen Lite — ESP32 Ride-Mode Controller v2.3
; PlatformIO Project Configuration
; Honda NX650 Dominator RFVC
;
; v2.3: Speed input (GPS/wheel/RPM), smooth mode transitions,
;        dedicated airbox RPM curves, rev limiter soft-cut
; v2.2: Auto-RPM exhaust valve, gear estimation, fuel tracking,
;        WiFi OTA update, config mode, sleep mode, auto-sunlight
; v2.1: 3-map CDI, DRV8833 motor driver option, sunlight display

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Serial monitor
monitor_speed = 115200
monitor_filters = default, time

; Upload
upload_speed = 921600
upload_port = /dev/ttyUSB0

; Build flags
build_flags =
    -DARDUINO=10819
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_ESP32_DEV
    ; Watchdog timeout
    -DESP_TASK_WDT_TIMEOUT_S=5
    ; Brownout detection
    -DESP_BROWNOUT_DET=1
    ; Version
    -DAQL_VERSION_MAJOR=2
    -DAQL_VERSION_MINOR=3
    -DAQL_VERSION_PATCH=0
    ; Motor driver: 0=RC servo (testing), 1=DRV8833+AS5600 (production)
    -DUSE_PRODUCTION_MOTOR=0
    ; OTA update: enable WiFi-based firmware updates
    -DENABLE_OTA_UPDATE=1
    ; Auto RPM-based exhaust valve: exhaust valve position follows RPM curve
    -DENABLE_AUTO_RPM_VALVE=1
    ; Fuel estimation: track fuel consumption per mode
    -DENABLE_FUEL_ESTIMATION=1
    ; Gear estimation: estimate current gear from RPM/speed
    -DENABLE_GEAR_ESTIMATION=1
    ; Sleep mode: deep sleep when engine off for >5 min
    -DENABLE_DEEP_SLEEP=1
    ; Speed input: GPS NMEA + wheel sensor + RPM fallback
    -DENABLE_SPEED_INPUT=1
    ; Smooth mode transitions: ease-in-out servo interpolation
    -DENABLE_MODE_TRANSITION=1

; Libraries
lib_deps =
    adafruit/Adafruit SSD1306 @ ^2.5.7
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit NeoPixel @ ^1.12.0
    madhephaestus/ESP32Servo @ ^1.1.2
    h2zero/NimBLE-Arduino @ ^1.4.0
    mathieucarbou/ESPAsyncWebServer @ ^3.1.5
    mathieucarbou/AsyncTCP @ ^3.2.4

; Partition scheme — use "default" for OTA support (2 app partitions)
board_build.partitions = default.csv

; Extra build flags for EEPROM
build_flags +=
    -DEEPROM_SIZE=64
